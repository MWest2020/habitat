# Docs-gates: contract- + drift-check per PR. Implementatie leeft in de hub
# (MWest2020/handbook); zie docs/reference/dispatch.md en het handbook.
name: docs-gates
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
jobs:
  gates:
    uses: MWest2020/handbook/.github/workflows/docs-gates.yml@add-docs-gates
    with:
      code_paths: "dispatch/,worker/,cage/,report/,orchestrator/"
      drift_mode: "fail"
      handbook_ref: "add-docs-gates"   # TEST: scripts van dezelfde branch; na merge weg (default main)
