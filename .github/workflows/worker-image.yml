# SPDX-License-Identifier: EUPL-1.2
# Bouwt de worker-image en pusht naar GHCR, getagd per commit-SHA, nooit `latest`.
name: worker-image

on:
  push:
    branches: [main]
    paths:
      - worker/**
      - report/**
      - .github/workflows/worker-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in bij GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (SHA-tag, immutable)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Containerfile
          push: true
          tags: ghcr.io/mwest2020/habitat-worker:${{ github.sha }}
