# SPDX-License-Identifier: EUPL-1.2
# Bouwt de worker-image en pusht naar GHCR, getagd per commit-SHA, nooit `latest`.
name: worker-image

on:
  push:
    branches: [main]
    paths:
      - worker/**
      - report/**
      - .github/workflows/worker-image.yml
  workflow_dispatch:

# Alleen checkout heeft de repo-token nodig; GHCR-push gaat via GHCR_PAT (zie hieronder),
# omdat het user-scoped package mwest2020/habitat-worker niet aan deze repo is gekoppeld
# en GITHUB_TOKEN daarom write_package-denied krijgt.
permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in bij GHCR
        # GHCR_PAT = fine-grained/classic PAT van de package-eigenaar met scope
        # write:packages (repo-secret). Vervangt GITHUB_TOKEN, dat geen write heeft op
        # het niet-gekoppelde user-package.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: MWest2020
          password: ${{ secrets.GHCR_PAT }}

      - name: Build + push (SHA-tag, immutable)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Containerfile
          push: true
          tags: ghcr.io/mwest2020/habitat-worker:${{ github.sha }}
