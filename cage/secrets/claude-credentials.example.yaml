# TEMPLATE — sub-first auth: de Claude-subscription-credentials (OAuth), niet een
# API-key. In prod versleuteld als claude-credentials.enc.yaml via SOPS.
# Maak het secret bij voorkeur direct uit je credential-bestand:
#   kubectl -n agents create secret generic claude-credentials \
#     --from-file=credentials.json="$HOME/.claude/.credentials.json"
# Onderstaande vorm is puur ter illustratie van de key.
apiVersion: v1
kind: Secret
metadata:
  name: claude-credentials
  namespace: agents
type: Opaque
stringData:
  credentials.json: |
    { "claudeAiOauth": { "accessToken": "PLACEHOLDER", "refreshToken": "PLACEHOLDER" } }
